[env:ESP32-S3-devKitv1]
platform = espressif32@6.6.0
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts =
    pre:auto_firmware_version.py
    post:post_build_merge.py
monitor_filters =
	esp32_exception_decoder
	time
	log2file
; memory_type=qio_qspi: Quad Flash + Quad PSRAM. eFuse reports 'quad' flash.
; opi (Octal PSRAM) crashed boot on this N16R8 — no serial output, no wifi.
board_build.arduino.memory_type = qio_qspi
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = huge_app.csv
build_flags =
	-D BOARD_HAS_PSRAM
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ESP32RGB=1
	-D RGB_LED_PIN=48
	-D AXEHUB_API_ENABLED=1
	-D AXEHUB_HW_FAST=1
	-D AXEHUB_HW_ASM=1
	-D AXEHUB_HW_ASM_PURE=1
	; SSAI-ROTR (AXEHUB_SW_ASM_ROUNDS) on LX7 measured: -10% sw_khs regression.
	; The "saves 1500 cyc on LX6" comment in nerdSHA256plus.cpp does NOT carry
	; over to LX7 — GCC for LX7 generates optimal ROTR automatically; the
	; inline-asm SSAI macro introduces pipeline stalls. Don't re-enable.
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=1
	-D CONFIG_ASYNC_TCP_QUEUE_SIZE=64
	-D CONFIG_ASYNC_TCP_STACK_SIZE=8192
	;-D AXEHUB_OVERCLOCK_MHZ=320      ; do not enable — unsupported PLL freq, falls back to 80 MHz
	;-D DEBUG_MINING=1
lib_deps =
	https://github.com/takkaO/OpenFontRender#v1.2
	bblanchon/ArduinoJson@^6.21.5
	https://github.com/tzapu/WiFiManager.git#v2.0.17
	mathertel/oneButton@^2.6.1
	arduino-libraries/NTPClient@^3.2.1
	fastled/FastLED@3.7.8
	ESP32Async/AsyncTCP@3.3.2
	ESP32Async/ESPAsyncWebServer@3.6.0
lib_ignore =
	TFT_eSPI
	HANSOLOminerv2

;-----------------------------------------------------------------------
