[env:ESP32-2432S028R]
platform = espressif32@6.6.0
board = esp32dev
framework = arduino
extra_scripts =
    pre:auto_firmware_version.py
    post:post_build_merge.py
monitor_speed = 115200
monitor_filters =
	esp32_exception_decoder
	time
	colorize
	;debug
upload_speed = 921600
;build_type = debug
board_build.partitions = huge_app.csv
build_flags =
	;-DDEBUG_MEMORY=1
	-D AXEHUB_API_ENABLED=1
	-D AXEHUB_DISPLAY=1
	-D AXEHUB_HW_PIPELINED_ASM=1   ; ENABLED with SW reverify + peripheral reinit per hit. Earlier disable hypothesis (raw HW digest causes pool duplicate-share rejections from peripheral race) is now bypassed — every hit goes through nerd_sha256d_baked on a SW-recomputed midstate so submitted shares match what the pool computes regardless of HW state. Re-init via DPORT clk_en/rst after each hit drops any stuck H state.
	-D AXEHUB_HW_PIPELINED_FRONT_C=1   ; v3 .S file with round_idx state machine + block-1 fill TEXT[10..15] pipelined into Wait4 slack. ~+3% pool_eff / +4% display vs baseline, 99.95% accept. TEXT[8..9] writes in slack are racy (peripheral re-reads them in SHA-256 message expansion).
	; -D AXEHUB_OVERCLOCK_MHZ=320  ; DISABLED: IDF whitelist 80/160/240 blocks non-standard freqs and direct rtc_clk_cpu_freq_set_config_fast bootloops on D0WD-V3 rev 3 silicon (BBPLL stays at 480 / div=1 → effective CPU=480 MHz → hang). Direct BBPLL multiplier tweak via I2C_BBPLL register also breaks WiFi PHY calibration. Stay at 240 MHz.
	; -D AXEHUB_OVERCLOCK_BBPLL_MULT=40  ; DISABLED: even mult=32 (stock value, no actual change) breaks WiFi — REGI2C_WRITE_MASK to BBPLL triggers a PLL relock that invalidates WiFi PHY calibration; AP setup screen appears but no AP is broadcast. To make this work the BBPLL tweak would have to run before Arduino init / before WiFi PHY calibration (early bootloader patch). Not viable in our setup() flow on D0WD-V3 rev 3. Stay at 240 MHz.
	; AXEHUB_HW_PIPELINED_ASM=1 — single inline-asm hot loop for the HW SHA
	; double-hash path. Replaces the C for-loop + helper-function pattern
	; with one __asm__ __volatile__ block in axehub_hw_pipelined_classic.cpp
	; that runs the full per-nonce sequence (block-1 fill, START, block-2
	; fill overlapped with block-1 compute, WAIT/CONTINUE/LOAD chain,
	; block-3 fill = persistent-zeros 2 stores, START block-3, hash counter
	; increment overlapped with block-3 compute, LOAD2, l16ui early reject,
	; loop or exit). The asm only returns to C on a candidate hit or
	; mining-flag drop, keeping all 26 fill stores + 5 triggers + 5 BUSY
	; polls per nonce inside one register file (no spills, no per-call
	; l32r). Layered on top of A.1 v2 + B.1 + C.1 + D.1.
	; AXEHUB_SW_ASM_ROUNDS=1 — disabled: inline asm `ssai+src` ROTR regression
	; -15% (6778 vs 5785 cyc/nonce baked). GCC's compiled `(x>>n)|(x<<32-n)`
	; is already optimal on LX6 — peephole recognises rotate, plus shift
	; sharing across S0/S1 macros. asm volatile blocks both. Don't re-enable.
	-DLOAD_FONT4=1
	-DLOAD_FONT6=1
	-D ESP32_2432S028R=1
	-DUSER_SETUP_LOADED=1
	-DILI9341_2_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_BACKLIGHT_ON=HIGH
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=12
	-DTFT_BL=21
	-DETOUCH_CS=33
	-DTOUCH_CLK=25
	-DTOUCH_MISO=39
	-DTOUCH_MOSI=32
	-DTOUCH_IRQ=36
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	
lib_deps =
	https://github.com/takkaO/OpenFontRender#v1.2
	bblanchon/ArduinoJson@^6.21.5
	https://github.com/tzapu/WiFiManager.git#v2.0.17
	mathertel/oneButton@^2.6.1
	arduino-libraries/NTPClient@^3.2.1
	bodmer/TFT_eSPI@^2.5.43
	https://github.com/achillhasler/TFT_eTouch
	ESP32Async/AsyncTCP@^3.3.2
	ESP32Async/ESPAsyncWebServer@^3.6.0
lib_ignore =
	HANSOLOminerv2

